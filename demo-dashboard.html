<!DOCTYPE html>
<html>
<head>
    <title>Demo Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background: #2d6a4f;
            color: white;
        }
        tr:hover {
            background: #f9f9f9;
        }
    </style>
</head>
<body>
    <h1>Demo Dashboard</h1>
    <p>Sample marketing metrics for testing Privacy Cockpit extension</p>
    
    <table role="grid">
        <tr role="row">
            <td role="gridcell">Campaign Name</td>
            <td role="gridcell">Demo Campaign Q1 2026</td>
        </tr>
        <tr role="row">
            <td role="gridcell">Spend</td>
            <td role="gridcell">$1,500.00</td>
        </tr>
        <tr role="row">
            <td role="gridcell">Conversions</td>
            <td role="gridcell">45</td>
        </tr>
        <tr role="row">
            <td role="gridcell">Impressions</td>
            <td role="gridcell">1,250</td>
        </tr>
        <tr role="row">
            <td role="gridcell">Clicks</td>
            <td role="gridcell">120</td>
        </tr>
        <tr role="row">
            <td role="gridcell">ROAS</td>
            <td role="gridcell">2.1</td>
        </tr>
    </table>
</body>
</html>
